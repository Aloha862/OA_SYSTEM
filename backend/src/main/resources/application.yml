server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: oa-management
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/oa_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:oa_user}
    password: ${DB_PASSWORD:change-me}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:oa_user}
    password: ${RABBITMQ_PASSWORD:change-me}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
  mail:
    host: ${OA_MAIL_HOST:smtp.qq.com}
    port: ${OA_MAIL_PORT:587}
    username: ${OA_MAIL_USERNAME:}
    password: ${OA_MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 15000
          writetimeout: 15000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      show-components: always
      probes:
        enabled: true
  health:
    mail:
      enabled: false

oa:
  cors:
    allowed-origins: ${OA_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  jwt:
    secret: ${OA_JWT_SECRET:local-development-secret-change-before-deploying}
    expiration: ${OA_JWT_EXPIRATION:86400000}
  mail:
    notification-recipient: ${OA_MAIL_TEST_RECIPIENT:}
  file:
    upload-path: ${OA_FILE_UPLOAD_PATH:./upload}
    access-prefix: /files
  tasks:
    zone: ${OA_TASKS_ZONE:Asia/Shanghai}
    scheduler:
      pool-size: ${OA_TASKS_POOL_SIZE:4}
    schedule-reminder:
      cron: ${OA_SCHEDULE_REMINDER_CRON:0 * * * * ?}
    schedule-lifecycle:
      cron: ${OA_SCHEDULE_LIFECYCLE_CRON:0 */5 * * * ?}
    approval-overdue:
      enabled: ${OA_APPROVAL_OVERDUE_ENABLED:true}
      cron: ${OA_APPROVAL_OVERDUE_CRON:0 0 9 * * MON-FRI}
      overdue-hours: ${OA_APPROVAL_OVERDUE_HOURS:24}
      batch-size: ${OA_APPROVAL_OVERDUE_BATCH_SIZE:200}
  ai:
    provider: ${OA_AI_PROVIDER:mock}
    log-retention-days: ${OA_AI_LOG_RETENTION_DAYS:90}
    conversation:
      max-messages: ${OA_AI_CONTEXT_MESSAGES:20}
      max-characters: ${OA_AI_CONTEXT_CHARACTERS:12000}
      cache-ttl: ${OA_AI_CONTEXT_CACHE_TTL:30m}
    tongyi:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:${TONGYI_API_KEY:}}
      model: qwen-plus
