name: Main branch source policy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  require-dev-source:
    name: Require dev source branch
    runs-on: ubuntu-latest
    steps:
      - name: Verify pull request source
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [ "$HEAD_BRANCH" != "dev" ]; then
            echo "Pull requests into main must come from the dev branch."
            exit 1
          fi
          echo "Source branch is dev."
